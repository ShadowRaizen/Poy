<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Letter to You 💌</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');

        * { transition: all 0.5s ease; }

        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #1e1233, #4c1d95, #831843);
            margin: 0;
            min-height: 100vh;
            color: white;
        }
        .romantic-font { font-family: 'Dancing Script', cursive; }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <!-- Envelope -->
    <div id="envelope" onclick="openEnvelope()" 
         style="max-width: 520px; margin: 100px auto 40px; cursor: pointer; text-align: center;">
        <div class="glass" style="padding: 80px 40px 100px; border-radius: 20px 20px 100px 100px;">
            <i class="fa-solid fa-envelope" style="font-size: 5.5rem; margin-bottom: 25px; display: block;"></i>
            <h1 class="romantic-font" style="font-size: 3.2rem; margin: 10px 0;">For My Love</h1>
            <p style="opacity: 0.9;">Tap to open your letter 💌</p>
        </div>
    </div>

    <!-- Content -->
    <div id="content" style="display: none; max-width: 720px; margin: 0 auto; padding: 20px;">
        <h1 class="romantic-font" style="text-align: center; font-size: 3rem; color: #fda4af;">My Dearest [Her Name]</h1>
        
        <div id="slideshow" style="position: relative; max-width: 700px; margin: 40px auto; height: 420px; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5);"></div>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="Tahanan - Wedding Version (c) El Manu & Jessy Kang [Official Audio].mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bgMusic');

        // Try to play music as soon as the page loads
        window.addEventListener('load', () => {
            music.play().catch(() => {
                // If blocked, it will try again when envelope is opened
            });
        });

        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            envelope.style.opacity = '0';
            envelope.style.transform = 'scale(0.6)';

            setTimeout(() => {
                envelope.style.display = 'none';
                document.getElementById('content').style.display = 'block';

                // Ensure music is playing
                if (music.paused) {
                    music.play().catch(() => {});
                }

                initSlideshow();
            }, 800);
        }

        function initSlideshow() {
            const slideshow = document.getElementById('slideshow');
            const slides = [
                {url: "https://picsum.photos/id/1015/800/600", note: "This moment still makes my heart race 💕"},
                {url: "https://picsum.photos/id/237/800/600", note: "I fall in love with you every time"},
                {url: "https://picsum.photos/id/1005/800/600", note: "You're my favorite memory"}
            ];

            slides.forEach((slide, i) => {
                const div = document.createElement('div');
                div.className = `slide ${i === 0 ? 'active' : ''}`;
                div.style.cssText = 'position:absolute;inset:0;opacity:0;visibility:hidden;';
                if (i === 0) div.style.cssText += 'opacity:1;visibility:visible;';
                div.innerHTML = `
                    <img src="${slide.url}" style="width:100%;height:100%;object-fit:cover;">
                    <div style="position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);padding:12px 28px;border-radius:30px;font-style:italic;">${slide.note}</div>
                `;
                slideshow.appendChild(div);
            });

            // Auto slideshow
            let current = 0;
            setInterval(() => {
                const all = document.querySelectorAll('.slide');
                all[current].style.opacity = '0';
                all[current].style.visibility = 'hidden';
                current = (current + 1) % all.length;
                all[current].style.opacity = '1';
                all[current].style.visibility = 'visible';
            }, 4500);
        }
    </script>
</body>
</html>
