<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Letter to You 💌</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');

        * { transition: all 0.4s ease; }

        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #1e1233, #4c1d95, #831843);
            margin: 0;
            min-height: 100vh;
            color: white;
        }
        .romantic-font { font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body>

    <!-- Play Music Button -->
    <button onclick="startMusic()" id="playBtn"
            style="position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; 
                   padding: 16px 32px; background: #e11d48; color: white; border: none; border-radius: 50px; 
                   font-size: 1.2rem; box-shadow: 0 10px 30px rgba(225,29,72,0.5);">
        ▶️ Play Our Song 💕
    </button>

    <!-- Envelope -->
    <div id="envelope" onclick="openEnvelope()" 
         style="max-width: 520px; margin: 140px auto 40px; cursor: pointer; text-align: center;">
        <div style="background: linear-gradient(145deg, #e11d48, #9f1239); padding: 80px 40px 100px; border-radius: 20px 20px 100px 100px; box-shadow: 0 30px 60px rgba(0,0,0,0.6);">
            <i class="fa-solid fa-envelope" style="font-size: 5.5rem; margin-bottom: 25px; display: block;"></i>
            <h1 class="romantic-font" style="font-size: 3.2rem; margin: 10px 0;">For My Love</h1>
            <p style="opacity: 0.9;">Tap to open your letter 💌</p>
        </div>
    </div>

    <!-- Content -->
    <div id="content" style="display: none; max-width: 700px; margin: 0 auto; padding: 20px;">
        <h1 class="romantic-font" style="text-align: center; font-size: 3rem; color: #fda4af;">My Dearest [Her Name]</h1>
        
        <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 24px; margin: 40px 0;">
            <h2 style="margin-bottom: 20px;">Our Memories</h2>
            <div id="gallery" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;"></div>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="Tahanan - Wedding Version (c) El Manu & Jessy Kang [Official Audio].mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bgMusic');

        function startMusic() {
            music.play().then(() => {
                const btn = document.getElementById('playBtn');
                btn.style.transition = 'all 0.6s';
                btn.style.opacity = '0';
                btn.style.transform = 'scale(0.8)';
                setTimeout(() => btn.style.display = 'none', 600);
            }).catch(err => {
                console.error(err);
                alert("Music file not found or can't be played. Make sure the mp3 file is in the same folder as index.html");
            });
        }

        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            envelope.style.opacity = '0';
            envelope.style.transform = 'scale(0.6)';

            setTimeout(() => {
                envelope.style.display = 'none';
                document.getElementById('content').style.display = 'block';

                if (music.paused) startMusic();

                initGallery();
            }, 800);
        }

        function initGallery() {
            const gallery = document.getElementById('gallery');
            const urls = [
                "https://picsum.photos/id/1015/600/400",
                "https://picsum.photos/id/237/600/400",
                "https://picsum.photos/id/1005/600/400"
            ];
            urls.forEach(url => {
                const div = document.createElement('div');
                div.innerHTML = `<img src="${url}" style="width:100%; border-radius:16px; cursor:pointer;" onclick="alert('💕 This memory makes my heart flutter')">`;
                gallery.appendChild(div);
            });
        }
    </script>
</body>
</html>
