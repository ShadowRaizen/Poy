<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love 💕</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');

        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #fce7f3, #f3e8ff, #fce7f3);
            margin: 0;
            min-height: 100vh;
            transition: background 0.5s;
        }
        .dark body {
            background: linear-gradient(135deg, #4c1d95, #831843, #4c1d95);
        }
        .romantic-font { font-family: 'Dancing Script', cursive; }
        .heart { animation: heartbeat 1.3s infinite; }
        @keyframes heartbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }

        .kiss {
            position: fixed;
            font-size: 3rem;
            pointer-events: none;
            animation: kissFly 3s forwards;
            z-index: 1000;
        }
        @keyframes kissFly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-400px) scale(0.4); opacity: 0; }
        }

        .card {
            background: rgba(255,255,255,0.9);
            border: 1px solid #fecaca;
        }
        .dark .card {
            background: rgba(30, 30, 40, 0.95);
            border-color: #9f1239;
        }

        /* Surprise Image Animations */
        #surpriseImage {
            max-width: 100%;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgb(225 29 72 / 0.4);
            transition: all 0.6s ease;
            opacity: 0;
            transform: scale(0.6) rotate(-8deg);
        }
        #surpriseImage.show {
            animation: imageReveal 1.2s forwards cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes imageReveal {
            0% {
                opacity: 0;
                transform: scale(0.6) rotate(-8deg);
            }
            50% {
                transform: scale(1.08) rotate(3deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        /* Floating hearts around image */
        .heart-float {
            position: absolute;
            font-size: 1.8rem;
            color: #f43f5e;
            pointer-events: none;
            animation: floatHeart 4s ease-in-out infinite;
            z-index: 10;
        }
        @keyframes floatHeart {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-180px) scale(0.6); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto p-6">

        <header class="text-center py-10">
            <div class="flex justify-between items-center mb-6">
                <button onclick="toggleDarkMode()" class="p-4 rounded-full hover:bg-white/50 dark:hover:bg-white/10 transition text-2xl">
                    <i id="themeIcon" class="fa-solid fa-moon"></i>
                </button>
                <div>
                    <i class="fa-solid fa-heart text-6xl text-rose-500 heart"></i>
                    <h1 class="text-5xl md:text-6xl romantic-font text-rose-600 dark:text-rose-400 mt-3">My Dearest [Her Name]</h1>
                </div>
                <div></div>
            </div>
        </header>

        <!-- Hero -->
        <div class="card rounded-3xl p-10 shadow-2xl mb-12 text-center">
            <p class="text-3xl leading-relaxed romantic-font text-rose-700 dark:text-rose-300">
                "Every moment with you feels like a dream I never want to wake up from 💕"
            </p>
        </div>

        <!-- Surprise Picture -->
        <div class="text-center mb-12">
            <button onclick="showSurprise()" 
                    class="px-10 py-5 bg-gradient-to-br from-pink-500 to-rose-500 text-white text-xl rounded-full font-medium shadow-xl hover:scale-105 transition-all flex items-center gap-3 mx-auto">
                <i class="fa-solid fa-gift"></i>
                Surprise Me 💖
            </button>
            
            <div id="surpriseContainer" class="mt-8 hidden relative">
                <div id="heartsContainer" style="position: absolute; width: 100%; height: 100%; pointer-events: none; overflow: hidden;"></div>
                <img id="surpriseImage" src="https://picsum.photos/id/1015/800/600" 
                     alt="Our Beautiful Memory">
                <p class="text-center mt-6 text-rose-600 romantic-font text-xl">This moment always makes my heart flutter...</p>
            </div>
        </div>

        <!-- Kiss Button -->
        <div class="text-center mb-12">
            <button onclick="sendKiss()" 
                    class="px-16 py-8 bg-gradient-to-br from-rose-500 to-purple-600 text-white text-3xl rounded-full font-medium shadow-2xl hover:scale-110 active:scale-95 transition-all flex items-center gap-4 mx-auto">
                💋 Send Her a Kiss 💕
            </button>
        </div>

        <!-- Countdown -->
        <div class="card rounded-3xl p-8 shadow-2xl mb-12">
            <h2 class="text-3xl font-bold text-rose-600 dark:text-rose-400 mb-6 flex items-center gap-3">
                <i class="fa-solid fa-calendar-days"></i> Our Anniversary Countdown
            </h2>
            <div id="countdown" class="grid grid-cols-4 gap-6 text-center"></div>
        </div>

        <!-- Music & Love Message -->
        <div class="grid md:grid-cols-2 gap-8">
            <div class="card rounded-3xl p-8 shadow-xl">
                <h2 class="text-2xl font-bold text-rose-600 dark:text-rose-400 mb-4">🎵 Our Love Song</h2>
                <audio id="bgMusic" loop>
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="card rounded-3xl p-8 shadow-xl">
                <h2 class="text-2xl font-bold text-rose-600 dark:text-rose-400 mb-4">💌 Love Message</h2>
                <button onclick="generateLoveMessage()" 
                        class="w-full py-7 bg-gradient-to-r from-pink-500 to-rose-500 text-white rounded-2xl text-xl hover:brightness-110">
                    Click for Sweet Words
                </button>
                <div id="loveMessage" class="mt-8 text-xl italic text-rose-700 dark:text-rose-300 text-center min-h-[100px]"></div>
            </div>
        </div>

        <div class="text-center py-16 text-rose-500/70">
            <p class="romantic-font text-4xl">Forever yours, [Your Name]</p>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('themeIcon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        // Surprise with animation + floating hearts
        function showSurprise() {
            const container = document.getElementById('surpriseContainer');
            const image = document.getElementById('surpriseImage');
            container.classList.remove('hidden');
            
            // Trigger animation
            setTimeout(() => {
                image.classList.add('show');
            }, 50);

            // Floating hearts
            createFloatingHearts();

            // Auto play music
            document.getElementById('bgMusic').play().catch(() => {});
        }

        function createFloatingHearts() {
            const container = document.getElementById('heartsContainer');
            const emojis = ['💕', '❤️', '💖', '💗'];
            
            for (let i = 0; i < 18; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-float';
                    heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (3 + Math.random() * 3) + 's';
                    heart.style.animationDelay = Math.random() * 1 + 's';
                    container.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 7000);
                }, i * 80);
            }
        }

        function sendKiss() {
            const emojis = ['💋','💕','❤️','😘','💖'];
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const k = document.createElement('div');
                    k.className = 'kiss';
                    k.textContent = emojis[Math.floor(Math.random()*emojis.length)];
                    k.style.left = Math.random() * window.innerWidth + 'px';
                    k.style.top = '65vh';
                    document.body.appendChild(k);
                    setTimeout(() => k.remove(), 4000);
                }, i * 70);
            }
        }

        function startCountdown() {
            const ann = new Date('2026-12-25'); // ← Change this!
            const el = document.getElementById('countdown');
            setInterval(() => {
                const diff = ann - new Date();
                if (diff < 0) {
                    el.innerHTML = `<div class="col-span-4 text-3xl">🎉 Happy Anniversary! 🎉</div>`;
                    return;
                }
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el.innerHTML = `
                    <div class="bg-white/70 dark:bg-gray-800 p-5 rounded-3xl"><div class="text-4xl font-bold text-rose-600">${d}</div><div class="text-xs">DAYS</div></div>
                    <div class="bg-white/70 dark:bg-gray-800 p-5 rounded-3xl"><div class="text-4xl font-bold text-rose-600">${h}</div><div class="text-xs">HOURS</div></div>
                    <div class="bg-white/70 dark:bg-gray-800 p-5 rounded-3xl"><div class="text-4xl font-bold text-rose-600">${m}</div><div class="text-xs">MIN</div></div>
                    <div class="bg-white/70 dark:bg-gray-800 p-5 rounded-3xl"><div class="text-4xl font-bold text-rose-600">${s}</div><div class="text-xs">SEC</div></div>
                `;
            }, 1000);
        }

        const messages = ["Your smile is my favorite view 💕", "I love you more every single day", "You make my heart flutter constantly", "Being with you feels like magic"];
        function generateLoveMessage() {
            const el = document.getElementById('loveMessage');
            el.textContent = `"${messages[Math.floor(Math.random() * messages.length)]}"`;
        }

        // Auto music on first tap/click
        document.addEventListener('click', () => {
            const music = document.getElementById('bgMusic');
            if (music.paused) music.play().catch(() => {});
        }, { once: true });

        window.onload = startCountdown;
    </script>
</body>
</html>
