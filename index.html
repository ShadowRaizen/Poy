<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Letter to You 💌</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');

        * { 
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #1e1233, #4c1d95, #831843);
            margin: 0;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        .romantic-font { font-family: 'Dancing Script', cursive; }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <!-- Game Screen -->
    <div id="gameScreen">
        <div style="text-align: center; padding: 40px 20px;">
            <h1 class="romantic-font" style="font-size: 3rem; margin-bottom: 20px;">A Small Game For You 💕</h1>
            <p style="font-size: 1.3rem; margin-bottom: 30px;">Tap as many hearts as you can in 10 seconds!</p>
            
            <div id="gameArea" style="position: relative; height: 420px; max-width: 420px; margin: 0 auto; background: rgba(0,0,0,0.3); border-radius: 24px; overflow: hidden; cursor: pointer;">
                <div id="score" style="position: absolute; top: 15px; left: 15px; font-size: 1.8rem; font-weight: bold; z-index: 10;">Score: 0</div>
                <div id="timer" style="position: absolute; top: 15px; right: 15px; font-size: 1.8rem; font-weight: bold; z-index: 10;">10</div>
            </div>

            <button onclick="startGame()" id="startGameBtn"
                    style="margin-top: 30px; padding: 16px 40px; background: #e11d48; color: white; border: none; border-radius: 50px; font-size: 1.4rem;">
                Play the Game 💕
            </button>
        </div>
    </div>

    <!-- Envelope -->
    <div id="envelope" onclick="openEnvelope()" style="display: none; max-width: 520px; margin: 80px auto; cursor: pointer; text-align: center; z-index: 10; position: relative;">
        <div class="glass" style="padding: 80px 40px 110px; border-radius: 20px 20px 110px 110px;">
            <i class="fa-solid fa-envelope" style="font-size: 5.5rem; margin-bottom: 25px;"></i>
            <h1 class="romantic-font" style="font-size: 3.2rem;">For My Love</h1>
            <p style="opacity: 0.9;">Tap to open your letter 💌</p>
        </div>
    </div>

    <!-- Sweet Message -->
    <div id="messageScreen" style="display: none; max-width: 700px; margin: 40px auto; padding: 30px; text-align: center; z-index: 10; position: relative;">
        <!-- Message content same as before -->
        <h1 class="romantic-font" style="font-size: 2.8rem; color: #fda4af; margin-bottom: 30px;">Mahal ko,</h1>
        <div style="background: rgba(255,255,255,0.1); padding: 40px; border-radius: 24px; line-height: 1.85; font-size: 1.22rem; text-align: left;">
            <p>Mahal, mula noong una kitang makilala, alam kong ikaw na ang taong hinihintay ko sa buong buhay ko...</p>
            <!-- (full message same as before) -->
        </div>
        <button onclick="showSlideshow()" style="margin-top: 50px; padding: 18px 45px; background: #e11d48; color: white; border: none; border-radius: 50px; font-size: 1.35rem;">
            Click here mi amore 💕
        </button>
    </div>

    <!-- Slideshow -->
    <div id="slideshowScreen" style="display: none; max-width: 720px; margin: 0 auto; padding: 20px; z-index: 10; position: relative;">
        <div id="stackContainer" style="position: relative; height: 520px; max-width: 620px; margin: 40px auto;"></div>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop playsinline webkit-playsinline>
        <source src="Tahanan - Wedding Version (c) El Manu & Jessy Kang [Official Audio].mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bgMusic');
        let score = 0;
        let timeLeft = 10;
        let gameInterval;

        function startGame() {
            document.getElementById('startGameBtn').style.display = 'none';
            score = 0;
            timeLeft = 10;
            updateScore();

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);

            // Spawn hearts
            setInterval(() => {
                if (timeLeft > 0) spawnHeart();
            }, 300);
        }

        function spawnHeart() {
            const area = document.getElementById('gameArea');
            const heart = document.createElement('div');
            heart.style.position = 'absolute';
            heart.style.fontSize = '3rem';
            heart.style.left = Math.random() * 80 + '%';
            heart.style.top = Math.random() * 70 + '%';
            heart.style.cursor = 'pointer';
            heart.textContent = '💕';
            heart.onclick = () => {
                score++;
                updateScore();
                heart.remove();
            };
            area.appendChild(heart);

            setTimeout(() => heart.remove(), 1500);
        }

        function updateScore() {
            document.getElementById('score').textContent = 'Score: ' + score;
        }

        function endGame() {
            clearInterval(gameInterval);
            alert(`Game Over! Your score: ${score} hearts 💕\n\nYou unlocked the letter!`);
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('envelope').style.display = 'block';
            music.play().catch(() => {});
        }

        function openEnvelope() {
            document.getElementById('envelope').style.display = 'none';
            document.getElementById('messageScreen').style.display = 'block';
        }

        function showSlideshow() {
            document.getElementById('messageScreen').style.display = 'none';
            document.getElementById('slideshowScreen').style.display = 'block';
            // Add slideshow code here if needed
        }
    </script>
</body>
</html>
