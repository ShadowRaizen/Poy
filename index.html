<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Letter to You 💌</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');

        * { transition: all 0.5s ease; }

        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #1e1233, #4c1d95, #831843);
            margin: 0;
            min-height: 100vh;
            color: white;
        }
        .romantic-font { font-family: 'Dancing Script', cursive; }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        #playBtn {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 14px 28px;
            background: #e11d48;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
        }

        #slideshow {
            position: relative;
            max-width: 700px;
            margin: 40px auto;
            height: 420px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
        }
        .slide.active {
            opacity: 1;
            visibility: visible;
        }
        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .floating-note {
            position: absolute;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 30px;
            font-style: italic;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: floatNote 6s ease-in-out infinite;
        }
        @keyframes floatNote {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-15px); }
        }
    </style>
</head>
<body>

    <button onclick="startMusic()" id="playBtn">▶️ Play Our Song 💕</button>

    <!-- Envelope -->
    <div id="envelope" onclick="openEnvelope()" style="max-width: 520px; margin: 100px auto; cursor: pointer; text-align: center;">
        <div class="glass" style="padding: 80px 40px 100px; border-radius: 20px 20px 100px 100px;">
            <i class="fa-solid fa-envelope" style="font-size: 5rem; margin-bottom: 20px;"></i>
            <h1 class="romantic-font" style="font-size: 3rem;">For My Love</h1>
            <p>Tap to open 💌</p>
        </div>
    </div>

    <!-- Content -->
    <div id="content" style="display: none; max-width: 720px; margin: 0 auto; padding: 20px;">
        <h1 class="romantic-font" style="text-align: center; font-size: 3rem; color: #fda4af;">My Dearest [Her Name]</h1>

        <div id="slideshow"></div>
    </div>

    <!-- Music -->
    <audio id="bgMusic" loop>
        <source src="Tahanan - Wedding Version (c) El Manu & Jessy Kang [Official Audio].mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bgMusic');

        function startMusic() {
            music.play().then(() => {
                const btn = document.getElementById('playBtn');
                btn.style.opacity = '0';
                setTimeout(() => btn.style.display = 'none', 600);
            }).catch(() => alert("Tap again to play music"));
        }

        function openEnvelope() {
            document.getElementById('envelope').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            if (music.paused) startMusic();
            initSlideshow();
        }

        function initSlideshow() {
            const slideshow = document.getElementById('slideshow');
            const slides = [
                {url: "https://picsum.photos/id/1015/800/600", note: "This moment still makes my heart race 💕"},
                {url: "https://picsum.photos/id/237/800/600", note: "I fall in love with you every time I see this"},
                {url: "https://picsum.photos/id/1005/800/600", note: "You're my favorite memory"},
            ];

            slides.forEach((slide, i) => {
                const div = document.createElement('div');
                div.className = `slide ${i === 0 ? 'active' : ''}`;
                div.innerHTML = `
                    <img src="${slide.url}">
                    <div class="floating-note">${slide.note}</div>
                `;
                slideshow.appendChild(div);
            });

            // Auto slideshow
            let current = 0;
            setInterval(() => {
                const allSlides = document.querySelectorAll('.slide');
                allSlides[current].classList.remove('active');
                current = (current + 1) % allSlides.length;
                allSlides[current].classList.add('active');
            }, 5000);
        }
    </script>
</body>
</html>
