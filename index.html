<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love 💕</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');

        :root { --rose: #e11d48; }
        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #fce7f3, #f3e8ff, #fce7f3);
            margin: 0;
            min-height: 100vh;
        }
        .dark body {
            background: linear-gradient(135deg, #4c1d95, #831843, #4c1d95);
        }
        .romantic-font { font-family: 'Dancing Script', cursive; }
        .heart { animation: heartbeat 1.3s infinite; }
        @keyframes heartbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }

        .kiss {
            position: fixed;
            font-size: 3rem;
            pointer-events: none;
            animation: kissFly 3s forwards;
            z-index: 1000;
        }
        @keyframes kissFly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-400px) scale(0.4); opacity: 0; }
        }
        .card {
            background: rgba(255,255,255,0.9);
            border: 1px solid #fecaca;
        }
        .dark .card {
            background: rgba(30, 30, 40, 0.95);
            border-color: #9f1239;
        }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto p-6">

        <header class="text-center py-10">
            <div class="flex justify-between items-center mb-6">
                <button onclick="toggleDarkMode()" class="p-4 rounded-full hover:bg-white/50 dark:hover:bg-white/10 transition text-2xl">
                    <i id="themeIcon" class="fa-solid fa-moon"></i>
                </button>
                <div>
                    <i class="fa-solid fa-heart text-6xl text-rose-500 heart"></i>
                    <h1 class="text-5xl md:text-6xl romantic-font text-rose-600 dark:text-rose-400 mt-3">My Dearest [Her Name]</h1>
                </div>
                <div></div>
            </div>
        </header>

        <div class="card rounded-3xl p-10 shadow-2xl mb-12 text-center">
            <p class="text-3xl leading-relaxed romantic-font text-rose-700 dark:text-rose-300">
                "You are my favorite person, my safest place, and the reason my heart smiles every day 💕"
            </p>
        </div>

        <div class="text-center mb-12">
            <button onclick="sendKiss()" 
                    class="px-16 py-10 bg-gradient-to-br from-rose-500 to-purple-600 text-white text-3xl rounded-full font-medium shadow-2xl hover:scale-110 active:scale-95 transition-all flex items-center gap-5 mx-auto">
                💋 Send a Kiss 💕
            </button>
        </div>

        <div class="card rounded-3xl p-8 shadow-2xl mb-12">
            <h2 class="text-3xl font-bold text-rose-600 dark:text-rose-400 mb-6 flex items-center gap-3">
                <i class="fa-solid fa-calendar-days"></i> Our Anniversary Countdown
            </h2>
            <div id="countdown" class="grid grid-cols-4 gap-6 text-center"></div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="card rounded-3xl p-8 shadow-xl">
                <h2 class="text-2xl font-bold text-rose-600 dark:text-rose-400 mb-4">🎵 Our Song</h2>
                <audio controls class="w-full">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="card rounded-3xl p-8 shadow-xl">
                <h2 class="text-2xl font-bold text-rose-600 dark:text-rose-400 mb-4">💌 Love Message</h2>
                <button onclick="generateLoveMessage()" 
                        class="w-full py-7 bg-gradient-to-r from-pink-500 to-rose-500 text-white rounded-2xl text-xl hover:brightness-110">
                    Click for a Sweet Message
                </button>
                <div id="loveMessage" class="mt-8 text-xl italic text-rose-700 dark:text-rose-300 text-center min-h-[100px]"></div>
            </div>
        </div>

        <div class="text-center py-16 text-rose-500/70">
            <p class="romantic-font text-4xl">Forever yours, [Your Name]</p>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('themeIcon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        function sendKiss() {
            const emojis = ['💋','💕','❤️','😘','💖'];
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const k = document.createElement('div');
                    k.className = 'kiss';
                    k.textContent = emojis[Math.floor(Math.random()*emojis.length)];
                    k.style.left = Math.random() * window.innerWidth + 'px';
                    k.style.top = '70vh';
                    document.body.appendChild(k);
                    setTimeout(() => k.remove(), 4000);
                }, i * 70);
            }
        }

        function startCountdown() {
            const ann = new Date('2026-12-25'); // ← Change this date!
            const el = document.getElementById('countdown');
            setInterval(() => {
                const diff = ann - new Date();
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el.innerHTML = `
                    <div class="bg-white/70 dark:bg-gray-800 p-5 rounded-3xl"><div class="text-4xl font-bold">${d}</div><div>Days</div></div>
                    <div class="bg-white/70 dark:bg-gray-800 p-5 rounded-3xl"><div class="text-4xl font-bold">${h}</div><div>Hours</div></div>
                    <div class="bg-white/70 dark:bg-gray-800 p-5 rounded-3xl"><div class="text-4xl font-bold">${m}</div><div>Min</div></div>
                    <div class="bg-white/70 dark:bg-gray-800 p-5 rounded-3xl"><div class="text-4xl font-bold">${s}</div><div>Sec</div></div>
                `;
            }, 1000);
        }

        const messages = ["Your smile is my favorite view", "I love you more every day", "You make my heart flutter", "You're my everything 💕"];
        function generateLoveMessage() {
            const el = document.getElementById('loveMessage');
            el.textContent = `"${messages[Math.floor(Math.random() * messages.length)]}"`;
        }

        window.onload = startCountdown;
    </script>
</body>
</html>
