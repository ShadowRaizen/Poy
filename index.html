<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Letter to You 💌</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap');

        * { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #1e1233, #4c1d95, #831843);
            margin: 0;
            min-height: 100vh;
            color: white;
        }
        .romantic-font { font-family: 'Dancing Script', cursive; }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        #envelope {
            max-width: 520px;
            margin: 80px auto;
            cursor: pointer;
        }
        .envelope-body {
            background: linear-gradient(145deg, #e11d48, #9f1239);
            padding: 80px 40px 110px;
            border-radius: 20px 20px 110px 110px;
            box-shadow: 0 35px 70px rgba(0,0,0,0.6);
        }

        #content { display: none; max-width: 720px; margin: 0 auto; padding: 20px; }

        .stack-container {
            position: relative;
            height: 480px;
            max-width: 620px;
            margin: 40px auto;
        }
        .stack-card {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            cursor: pointer;
            opacity: 0;
            transform: scale(0.9) rotate(0deg);
        }
        .stack-card.active {
            opacity: 1;
            transform: scale(1) rotate(0deg);
            z-index: 10;
        }
        .stack-card img, .stack-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .sweet-note {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            padding: 14px 32px;
            border-radius: 50px;
            font-style: italic;
            max-width: 80%;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Envelope -->
    <div id="envelope" onclick="openEnvelope()">
        <div class="envelope-body glass">
            <div style="text-align: center; color: white;">
                <i class="fa-solid fa-envelope" style="font-size: 5.5rem; margin-bottom: 20px;"></i>
                <h1 class="romantic-font" style="font-size: 3.2rem;">For My Love</h1>
                <p style="opacity: 0.9;">Tap to open your letter 💌</p>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div id="content">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 class="romantic-font" style="font-size: 3rem; color: #fda4af;">My Dearest [Her Name]</h1>
        </div>

        <div class="stack-container" id="stackContainer"></div>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="Tahanan - Wedding Version (c) El Manu & Jessy Kang [Official Audio].mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById('bgMusic');

        // Auto attempt on load
        window.addEventListener('load', () => {
            music.play().catch(() => {});
        });

        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            envelope.style.opacity = '0';
            envelope.style.transform = 'scale(0.6)';

            setTimeout(() => {
                envelope.style.display = 'none';
                document.getElementById('content').style.display = 'block';

                if (music.paused) music.play().catch(() => {});

                initStack();
            }, 800);
        }

        function initStack() {
            const container = document.getElementById('stackContainer');
            const items = [
                { type: "img", url: "https://picsum.photos/id/1015/800/600", note: "This moment still gives me butterflies 💕" },
                { type: "img", url: "https://picsum.photos/id/237/800/600", note: "I fall in love with you every single day" },
                { type: "img", url: "https://picsum.photos/id/1005/800/600", note: "You're my favorite place to be" },
                { type: "img", url: "https://picsum.photos/id/201/800/600", note: "Forever grateful for us 💗" }
            ];

            let currentIndex = 0;

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `stack-card glass ${index === 0 ? 'active' : ''}`;
                card.innerHTML = `
                    <img src="${item.url}">
                    <div class="sweet-note">${item.note}</div>
                `;
                card.onclick = () => {
                    currentIndex = (currentIndex + 1) % items.length;
                    document.querySelectorAll('.stack-card').forEach((c, i) => {
                        c.classList.toggle('active', i === currentIndex);
                    });
                };
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
